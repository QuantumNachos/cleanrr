services:
  cleanrr:
    build: .
    container_name: cleanrr
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:

      # ── Radarr ────────────────────────────────────────────────────────────────
      # Get your API key from: Radarr → Settings → General → API Key
      #
      # CASE A: Radarr runs on the same machine as Cleanrr (bare metal or different compose file)
      #   Use your server's LAN IP — never use "localhost" inside Docker
      #   RADARR_URL: "http://192.168.1.100:7878"
      #
      # CASE B: Radarr is in the same Docker Compose file as Cleanrr
      #   Use the service name defined in that compose file
      #   RADARR_URL: "http://radarr:7878"
      #
      # CASE C: Radarr is behind a reverse proxy (nginx, Caddy, Traefik)
      #   Point directly at the internal port to bypass proxy auth
      #   RADARR_URL: "http://192.168.1.100:7878"   ← internal port, not the subdomain
      #
      RADARR_URL: "http://YOUR_SERVER_IP:7878"
      RADARR_API_KEY: "your_radarr_api_key_here"

      # ── Sonarr ────────────────────────────────────────────────────────────────
      # Get your API key from: Sonarr → Settings → General → API Key
      # Same networking rules as Radarr above apply
      #
      SONARR_URL: "http://YOUR_SERVER_IP:8989"
      SONARR_API_KEY: "your_sonarr_api_key_here"

      # ── qBittorrent ───────────────────────────────────────────────────────────
      # Enable the WebUI in qBittorrent: Tools → Web UI → enable
      # Default port is 8080. Use your WebUI username and password below.
      # Same networking rules as above apply.
      #
      QBIT_URL: "http://YOUR_SERVER_IP:8080"
      QBIT_USER: "admin"
      QBIT_PASS: "your_qbittorrent_password_here"

      # ── Jellyfin (optional) ───────────────────────────────────────────────────
      # Used to show watched status. Cleanrr never writes to Jellyfin.
      #
      # Get your API key from:
      #   Jellyfin → Dashboard → Advanced → API Keys → click the + button
      #
      # Default port is 8096.
      # Same networking rules as Radarr above apply.
      #
      # CASE A: Jellyfin on the same machine
      #   JELLYFIN_URL: "http://192.168.1.100:8096"
      #
      # CASE B: Jellyfin in the same Docker Compose file
      #   JELLYFIN_URL: "http://jellyfin:8096"
      #
      JELLYFIN_URL: "http://YOUR_SERVER_IP:8096"
      JELLYFIN_API_KEY: "your_jellyfin_api_key_here"

      # ── Plex (optional) ───────────────────────────────────────────────────────
      # Used to show watched status. Cleanrr never writes to Plex.
      #
      # How to get your Plex token:
      #   1. Open Plex Web and play any item
      #   2. Click ··· → Get Info → View XML
      #   3. Look for X-Plex-Token= in the URL bar
      #
      # Default port is 32400.
      # Same networking rules as Radarr above apply.
      #
      # CASE A: Plex on the same machine
      #   PLEX_URL: "http://192.168.1.100:32400"
      #
      # CASE B: Plex in the same Docker Compose file
      #   PLEX_URL: "http://plex:32400"
      #
      PLEX_URL: "http://YOUR_SERVER_IP:32400"
      PLEX_TOKEN: "your_plex_token_here"

    # ── Networking ────────────────────────────────────────────────────────────
    # If your *arr stack runs in a separate Docker network, uncomment and set
    # the network name below so Cleanrr can reach the other containers by name.
    # Run "docker network ls" to see your existing networks.
    #
    # networks:
    #   - arr-network

# networks:
#   arr-network:
#     external: true
