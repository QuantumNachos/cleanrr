<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cleanrr — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11; --surface: #18181c; --surface2: #202026;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #e8e8ea; --muted: #888892;
    --accent: #e5484d; --accent-bg: rgba(229,72,77,0.12);
    --green: #46a758; --green-bg: rgba(70,167,88,0.12);
    --radius: 10px; --radius-sm: 6px;
  }
  [data-theme="light"] {
    --bg: #f4f4f6; --surface: #ffffff; --surface2: #f0f0f3;
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
    --text: #111114; --muted: #6b6b78;
    --accent: #d03b3f; --accent-bg: rgba(208,59,63,0.08);
    --green: #2d7d3a; --green-bg: rgba(45,125,58,0.08);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 2rem; width: 100%; max-width: 380px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; justify-content: center; }
  .logo-mark { width: 40px; height: 40px; border-radius: 10px; background: #111114; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.35); }
  .logo-mark svg { width: 24px; height: 24px; fill: none; stroke: white; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .logo-text { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  .logo-text span { color: var(--accent); }
  h2 { font-size: 16px; font-weight: 500; margin-bottom: 1.5rem; color: var(--muted); text-align: center; }
  .field { margin-bottom: 1rem; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 10px 12px; font-size: 14px; outline: none; transition: border-color 0.15s; }
  input:focus { border-color: var(--border2); }
  .btn { width: 100%; background: var(--accent); border: none; color: white; border-radius: var(--radius-sm); padding: 11px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(229,72,77,0.3); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; margin-top: 1rem; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 36 36"><path d="M10 14h16M13 14v-2h10v2M12 14l1.5 14h9l1.5-14"/><circle cx="26" cy="25" r="6" fill="#e5484d" stroke="none"/><path d="M23 25l2 2 4-4" stroke="white"/></svg>
    </div>
    <span class="logo-text">Clean<span>rr</span></span>
  </div>
  <h2>Sign in to continue</h2>
  <div class="field"><label>Username</label><input type="text" id="username" autocomplete="username" /></div>
  <div class="field"><label>Password</label><input type="password" id="password" autocomplete="current-password" /></div>
  <button class="btn" id="btn" onclick="login()">Sign in</button>
  <div class="error" id="error"></div>
</div>
<script>
  (function() {
    const saved = localStorage.getItem('cleanrr-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
    else if (window.matchMedia('(prefers-color-scheme: light)').matches) document.documentElement.setAttribute('data-theme', 'light');
  })();

  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn');
    const err = document.getElementById('error');
    err.style.display = 'none';
    if (!username || !password) { showError('Please enter your username and password'); return; }
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const r = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
      const d = await r.json();
      if (d.ok) { window.location.href = '/'; }
      else { showError(d.error || 'Invalid username or password'); btn.disabled = false; btn.textContent = 'Sign in'; }
    } catch { showError('Connection error — try again'); btn.disabled = false; btn.textContent = 'Sign in'; }
  }

  function showError(msg) {
    const err = document.getElementById('error');
    err.textContent = msg; err.style.display = 'block';
  }
</script>
</body>
</html>
